name: Generate KARAN Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate standard snake
        uses: Platane/snk@v3
        with:
          github_user_name: RootBugs
          outputs: |
            dist/snake-light.svg
              palette=github-light
              color_snake=#54a3ff
              color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/snake-dark.svg
              palette=github-dark
              color_snake=#54a3ff
              color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Generate KARAN snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_karan_snake.py

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
